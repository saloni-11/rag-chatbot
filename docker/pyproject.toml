# ============================================================
# pyproject.toml — Tool configuration
# ============================================================
# Centralises config for black, isort, and other tools.
# Without this, black and isort may disagree on import formatting,
# causing CI to fail even though each tool passes individually.

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.isort]
profile = "black"          # makes isort compatible with black's formatting
line_length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
