# ============================================================
# .github/workflows/ci.yml — CI/CD Pipeline
# ============================================================
# Runs automatically on every push and pull request.
#
# WHAT IS GITHUB ACTIONS?
#   GitHub's built-in CI/CD system. When you push code, GitHub
#   spins up a virtual machine (called a "runner"), clones your
#   repo, and executes the steps defined here. If any step fails,
#   the pipeline fails and you see a red X on the commit.
#
# WHAT IS CI/CD?
#   CI (Continuous Integration): automatically run tests on every
#     code change to catch bugs early.
#   CD (Continuous Deployment): automatically deploy to production
#     after tests pass. We do CI here; CD comes in Phase 9.
#
# PIPELINE STRUCTURE:
#   1. Lint  — check code style (black, isort, flake8)
#   2. Test  — run pytest (unit + integration tests)
#   3. Build — verify Docker image builds successfully
#
# WHY THIS ORDER?
#   Lint is fastest (~10 sec) so it fails first if there's a style issue.
#   Tests are next (~30 sec). Docker build is slowest (~2 min) and only
#   runs if lint + tests pass. This saves CI minutes on obvious failures.
# ============================================================

name: CI Pipeline

# When to run this pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint ──────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      # Check out the code (every job starts with a clean slate)
      - uses: actions/checkout@v4

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install linting tools only (fast — no ML dependencies)
      - name: Install linting tools
        run: pip install black isort flake8

      # Check formatting with black (--check = don't modify, just report)
      - name: Check black formatting
        run: black --check --diff src/ tests/

      # Check import ordering
      - name: Check isort import ordering
        run: isort --check-only --diff src/ tests/

      # Check for common Python errors and style issues
      - name: Run flake8
        run: flake8 src/ tests/ --max-line-length 100 --ignore E501,W503,E203

  # ── Job 2: Test ──────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint  # only run if lint passes

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache pip packages so subsequent runs are faster
      # (downloads ~2 GB of ML packages on first run, cached after)
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install all dependencies (including ML packages for tests)
      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # Run tests with coverage
      - name: Run tests
        env:
          HF_HUB_OFFLINE: "0"  # CI needs to download the model on first run
        run: python -m pytest --cov=src --cov-report=term-missing

  # ── Job 3: Docker Build ──────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test  # only run if tests pass

    steps:
      - uses: actions/checkout@v4

      # Build the Docker image to verify it compiles
      # (doesn't push anywhere — just verifies the build works)
      - name: Build Docker image
        run: docker build -t rag-chatbot:ci .
